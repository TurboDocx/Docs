  /api/webhooks/signature/replay:
    post:
      tags:
        - Webhook Routes
      summary: Replay Webhook Delivery
      description: >-
        Manually retry a specific past delivery by its ID. Creates a new
        delivery row and immediately attempts re-delivery to all configured
        URLs. Returns the full delivery object for the new attempt.

        **Requires administrator role.** Non-admin keys receive 403.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deliveryId:
                  type: string
                  description: The ID of the delivery to replay.
                  example: dlv_abc123
              required:
                - deliveryId
      parameters:
        - name: authorization
          in: header
          schema:
            type: string
          example: Bearer {{TDX- API Key}}
        - name: x-rapiddocx-org-id
          in: header
          schema:
            type: string
          example: "{{TurboDocx Organization ID}}"
        - name: accept
          in: header
          schema:
            type: string
          example: application/json, text/plain, */*
        - name: accept-language
          in: header
          schema:
            type: string
          example: en-US,en;q=0.9
        - name: content-type
          in: header
          schema:
            type: string
          example: application/json
        - name: dnt
          in: header
          schema:
            type: integer
          example: "1"
        - name: origin
          in: header
          schema:
            type: string
          example: https://app.turbodocx.com
        - name: referer
          in: header
          schema:
            type: string
          example: https://app.turbodocx.com/
        - name: sec-ch-ua
          in: header
          schema:
            type: string
          example: '"Google Chrome";v="123", "Not:A-Brand";v="8", "Chromium";v="123"'
        - name: sec-ch-ua-mobile
          in: header
          schema:
            type: string
          example: "?0"
        - name: sec-ch-ua-platform
          in: header
          schema:
            type: string
          example: '"Windows"'
        - name: sec-fetch-dest
          in: header
          schema:
            type: string
          example: empty
        - name: sec-fetch-mode
          in: header
          schema:
            type: string
          example: cors
        - name: sec-fetch-site
          in: header
          schema:
            type: string
          example: same-site
      responses:
        "200":
          description: Delivery replayed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      webhookId:
                        type: string
                      eventType:
                        type: string
                      payload:
                        type: object
                      httpStatus:
                        type: integer
                        nullable: true
                      isDelivered:
                        type: boolean
                      attemptCount:
                        type: integer
                      deliveredAt:
                        type: string
                        format: date-time
                        nullable: true
                      createdOn:
                        type: string
                        format: date-time
                  message:
                    type: string
        "400":
          description: Bad Request — missing deliveryId
          content:
            application/json: {}
        "401":
          description: Unauthorized — missing or invalid API key
          content:
            application/json: {}
        "403":
          description: Forbidden — requires administrator role
          content:
            application/json: {}
        "404":
          description: Not Found — delivery or webhook not found
          content:
            application/json: {}
        "429":
