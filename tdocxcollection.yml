  /api/webhooks:
    post:
      tags:
        - Webhook Routes
      summary: Create Webhook
      description: >-
        Register a new signature webhook for the org. The `name` field is
        hardcoded to `signature` by the SDK. The returned `secret` is shown
        **once** — store it on receipt. It cannot be retrieved later; use
        Regenerate Webhook Secret if lost.

        Returns 409 if a webhook named `signature` already exists for this org.

        **Requires administrator role.** Non-admin keys receive 403.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Webhook name. The SDK always sends "signature".
                  example: signature
                urls:
                  type: array
                  description: One or more HTTPS endpoints to receive event payloads. HTTP URLs are rejected.
                  items:
                    type: string
                  example:
                    - https://example.com/webhooks/turbodocx
                events:
                  type: array
                  description: List of event types to subscribe to.
                  items:
                    type: string
                  example:
                    - signature.document.completed
                    - signature.document.voided
              required:
                - name
                - urls
                - events
      parameters:
        - name: authorization
          in: header
          schema:
            type: string
          example: Bearer {{TDX- API Key}}
        - name: x-rapiddocx-org-id
          in: header
          schema:
            type: string
          example: "{{TurboDocx Organization ID}}"
        - name: accept
          in: header
          schema:
            type: string
          example: application/json, text/plain, */*
        - name: accept-language
          in: header
          schema:
            type: string
          example: en-US,en;q=0.9
        - name: content-type
          in: header
          schema:
            type: string
          example: application/json
        - name: dnt
          in: header
          schema:
            type: integer
          example: "1"
        - name: origin
          in: header
          schema:
            type: string
          example: https://app.turbodocx.com
        - name: referer
          in: header
          schema:
            type: string
          example: https://app.turbodocx.com/
        - name: sec-ch-ua
          in: header
          schema:
            type: string
          example: '"Google Chrome";v="123", "Not:A-Brand";v="8", "Chromium";v="123"'
        - name: sec-ch-ua-mobile
          in: header
          schema:
            type: string
          example: "?0"
        - name: sec-ch-ua-platform
          in: header
          schema:
            type: string
          example: '"Windows"'
        - name: sec-fetch-dest
          in: header
          schema:
            type: string
          example: empty
        - name: sec-fetch-mode
          in: header
          schema:
            type: string
          example: cors
        - name: sec-fetch-site
          in: header
          schema:
            type: string
          example: same-site
      responses:
        "200":
          description: Webhook created successfully. Save the returned secret — it is shown once only.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Unique webhook ID
                      secret:
                        type: string
                        description: HMAC signing secret. Shown once; store immediately.
                  message:
                    type: string
        "400":
          description: Bad Request — validation error (e.g. HTTP URL provided)
          content:
            application/json: {}
        "401":
          description: Unauthorized — missing or invalid API key
          content:
            application/json: {}
        "403":
          description: Forbidden — requires administrator role
          content:
            application/json: {}
        "409":
          description: Conflict — a webhook named "signature" already exists for this org
          content:
            application/json: {}
        "429":
          description: Too Many Requests — rate limit exceeded
          content:
            application/json: {}
