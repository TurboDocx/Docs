name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: short description"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please include enough detail to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / environment
      placeholder: e.g. package version, OS, browser
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant error output — code blocks render.
